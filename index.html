<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Landing</title>

    <!-- Fonts (match main.css choices) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&family=Space+Mono:wght@400;700&family=Fragment+Mono&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header class="image-header" aria-label="Header image">
      <img src="tbd.png" alt="" />
    </header>

    <main class="grid" aria-label="Navigation">
      <!-- 1) Large full-width section -->
      <a class="tile tile--wide" href="#" data-href="page-1.html">
        <span class="tile__label">Sezione 1</span>
        <span class="tile__title">Wide section</span>
        <span class="tile__hint">Tieni premuto per aprire</span>
      </a>

      <!-- 2) 2x2 sections -->
      <a class="tile tile--sq" href="#" data-href="page-2.html">
        <span class="tile__label">Sezione 2</span>
        <span class="tile__title">Square A</span>
        <span class="tile__hint">Tieni premuto per aprire</span>
      </a>

      <a class="tile tile--sq" href="#" data-href="page-3.html">
        <span class="tile__label">Sezione 3</span>
        <span class="tile__title">Square B</span>
        <span class="tile__hint">Tieni premuto per aprire</span>
      </a>

      <a class="tile tile--sq" href="#" data-href="page-4.html">
        <span class="tile__label">Sezione 4</span>
        <span class="tile__title">Square C</span>
        <span class="tile__hint">Tieni premuto per aprire</span>
      </a>

      <a class="tile tile--sq" href="#" data-href="page-5.html">
        <span class="tile__label">Sezione 5</span>
        <span class="tile__title">Square D</span>
        <span class="tile__hint">Tieni premuto per aprire</span>
      </a>
    </main>

    <script src="index.js" defer></script>
  </body>
</html>
